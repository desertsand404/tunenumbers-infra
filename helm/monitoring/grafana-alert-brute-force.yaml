apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alert-brute-force
  namespace: monitoring
  labels:
    grafana_alert: "1"
data:
  brute-force.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: infrastructure
        folder: Alerts
        interval: 1m
        rules:
          - uid: brute-force-new-ban
            title: "New IP Banned — Brute Force"
            condition: C
            for: 0s
            noDataState: OK
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: loki
                model:
                  expr: "sum by (ip) (count_over_time({namespace=\"crowdsec\"} |= \"new ban\" | logfmt | ip != \"\" [5m]))"
                  queryType: range
                  refId: A
              - refId: C
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
            annotations:
              summary: "New IP banned: {{ $labels.ip }} (brute-force on tunenumbers.de)"
