server:
  nodeSelector:
    kubernetes.io/hostname: vps1
  retention: "14d"
  extraArgs:
    web.enable-remote-write-receiver: ""
  global:
    scrape_interval: 30s
    evaluation_interval: 30s
  persistentVolume:
    enabled: true
    size: 10Gi
    storageClass: "local-path"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  service:
    type: ClusterIP
  ingress:
    enabled: false

prometheus-node-exporter:
  enabled: false

prometheus-pushgateway:
  enabled: false

kube-state-metrics:
  enabled: true
  nodeSelector:
    kubernetes.io/hostname: babel-it
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

alertmanager:
  enabled: false

serverFiles:
  prometheus.yml:
    scrape_configs:
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['prometheus-kube-state-metrics.monitoring.svc.cluster.local:8080']
      - job_name: 'k3s-metrics'
        static_configs:
          - targets: ['10.0.0.2:10250']
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      - job_name: 'alloy-metrics'
        static_configs:
          - targets: ['alloy.monitoring.svc.cluster.local:12345']
      - job_name: 'k3s-cadvisor'
        static_configs:
          - targets: ['10.0.0.2:10250']
        scheme: https
        metrics_path: /metrics/cadvisor
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
      - job_name: 'minio'
        static_configs:
          - targets: ['minio.tunenumbers.svc.cluster.local:9000']
        metrics_path: /minio/v2/metrics/cluster
      - job_name: 'minio-bucket'
        static_configs:
          - targets: ['minio.tunenumbers.svc.cluster.local:9000']
        metrics_path: /minio/v2/metrics/bucket
      - job_name: 'postgres-exporter'
        static_configs:
          - targets: ['prometheus-postgres-exporter.monitoring.svc.cluster.local:9187']
      - job_name: 'gitea'
        static_configs:
          - targets: ['gitea-http.gitea.svc.cluster.local:3000']
        metrics_path: /metrics
      # CrowdSec LAPI Prometheus exporter (port 6060).
      # Verify service name after Helm upgrade: kubectl get svc -n crowdsec
      - job_name: 'crowdsec'
        static_configs:
          - targets: ['crowdsec-service.crowdsec.svc.cluster.local:6060']
        metrics_path: /metrics
