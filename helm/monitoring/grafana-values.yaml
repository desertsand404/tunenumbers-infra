# Grafana Helm values — monitoring on vps1
admin:
  existingSecret: grafana-admin-secret
  userKey: admin-user
  passwordKey: admin-password

persistence:
  enabled: true
  size: 1Gi
  storageClassName: local-path

podSecurityContext:
  runAsUser: 472
  runAsGroup: 472
  fsGroup: 472

initChownData:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

nodeSelector:
  kubernetes.io/hostname: vps1

service:
  type: ClusterIP

ingress:
  enabled: false

# SMTP credentials from the existing smtp-credentials Secret in the monitoring namespace.
# These GF_SMTP_* env vars configure Grafana's built-in mailer for alert notifications.
env:
  GF_SMTP_ENABLED: "true"
  GF_SMTP_HOST: "smtps.udag.de:465"
  GF_SMTP_FROM_ADDRESS: "notification@tunenumbers.de"
  GF_SMTP_FROM_NAME: "tunenumbers Monitoring"
  GF_SMTP_SKIP_VERIFY: "false"

envValueFrom:
  GF_SMTP_USER:
    secretKeyRef:
      name: smtp-credentials
      key: smtp_user
  GF_SMTP_PASSWORD:
    secretKeyRef:
      name: smtp-credentials
      key: smtp_password

plugins:
  - yesoreyeram-infinity-datasource

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: "30s"
      - name: Loki
        uid: loki
        type: loki
        url: http://loki.monitoring.svc.cluster.local:3100
        access: proxy
      - name: CrowdSec LAPI
        uid: crowdsec-lapi
        type: yesoreyeram-infinity-datasource
        access: proxy
        jsonData:
          global_queries: []

sidecar:
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"
    folder: /tmp/dashboards
    searchNamespace: monitoring
    resource: configmap
  alerts:
    enabled: true
    label: grafana_alert
    labelValue: "1"
    searchNamespace: monitoring
    resource: configmap

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
      - name: tunenumbers-applications
        orgId: 1
        folder: 'tunenumbers Applications'
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 30
        options:
          path: /tmp/dashboards

dashboards:
  default:
    node-exporter-full:
      gnetId: 1860
      revision: 37
      datasource: Prometheus
    traefik:
      gnetId: 17347
      revision: 9
      datasource: Prometheus
    loki-logs:
      gnetId: 13639
      revision: 2
      datasource: Loki

grafana.ini:
  server:
    domain: monitoring.tunenumbers.de
    root_url: https://monitoring.tunenumbers.de
  unified_alerting:
    enabled: true

alerting:
  contactpoints.yaml:
    apiVersion: 1
    resetOnStart: true
    contactPoints:
      - orgId: 1
        name: default-email
        receivers:
          - uid: default-email
            type: email
            settings:
              addresses: admin@tunenumbers.de
  policies.yaml:
    apiVersion: 1
    resetOnStart: true
    policies:
      - orgId: 1
        receiver: default-email
        group_by:
          - grafana_folder
          - alertname
  rules.yaml:
    apiVersion: 1
    groups:
      - orgId: 1
        name: infrastructure
        folder: Alerts
        interval: 1m
        rules:
          - uid: disk-usage-high
            title: "Disk Usage > 85%"
            condition: C
            for: 5m
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "100 - (node_filesystem_avail_bytes{mountpoint='/'} / node_filesystem_size_bytes{mountpoint='/'} * 100)"
              - refId: C
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [85]
            annotations:
              summary: "Disk usage above 85%"
          - uid: crashloop-backoff
            title: "Pod CrashLoopBackOff"
            condition: C
            for: 2m
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
              - refId: C
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
            annotations:
              summary: "Pod is in CrashLoopBackOff"
          - uid: cert-expiry
            title: "TLS Cert Expiry < 14 days"
            condition: C
            for: 1h
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "(certmanager_certificate_expiration_timestamp_seconds - time()) / 86400"
              - refId: C
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: lt
                        params: [14]
            annotations:
              summary: "Certificate expires in < 14 days"
          - uid: memory-high
            title: "Memory Usage > 90%"
            condition: C
            for: 5m
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "(1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100"
              - refId: C
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [90]
            annotations:
              summary: "Node memory usage above 90%"
          - uid: brute-force-new-ban
            title: "New IP Banned — Brute Force"
            condition: C
            for: 0s
            data:
              - refId: A
                relativeTimeRange:
                  from: 300
                  to: 0
                datasourceUid: prometheus
                model:
                  expr: "sum(increase(cs_active_decisions{action=\"ban\"}[5m]))"
              - refId: C
                relativeTimeRange:
                  from: 0
                  to: 0
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: A
                  conditions:
                    - evaluator:
                        type: gt
                        params: [0]
            annotations:
              summary: "New IP banned for brute-force activity on tunenumbers.de"
