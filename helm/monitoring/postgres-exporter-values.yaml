config:
  datasource:
    host: postgresql.tunenumbers.svc.cluster.local
    port: "5432"
    user: exporter
    passwordSecret:
      name: postgres-exporter-secret
      key: password
    database: directus
    sslmode: disable

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

nodeSelector:
  kubernetes.io/hostname: vps1

service:
  type: ClusterIP
  port: 9187

serviceMonitor:
  enabled: false
