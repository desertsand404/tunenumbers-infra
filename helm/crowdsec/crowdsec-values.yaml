# CrowdSec Helm values for tunenumbers.de
# Chart:     crowdsec/crowdsec  (helm repo add crowdsec https://crowdsec.github.io/helm-charts)
# Namespace: crowdsec
# Release:   crowdsec
#
# NOTE: lapi.extraVolumeMounts and lapi.initContainers are NOT applied by this
# chart version. Email notification config (email.yaml) and profiles.yaml are
# instead mounted via a kubectl patch in ansible/playbooks/10-brute-force-protection.yml
# after every helm upgrade. The patch uses Secret 'crowdsec-notification-config'
# which Ansible creates with SMTP credentials rendered from 'smtp-credentials'.
#
# CRITICAL (chart 0.22.0 + image v1.7.6 incompatibility): the LAPI entrypoint runs
# `ln -s /etc/crowdsec_data /etc/crowdsec`, which silently fails because the v1.7.6
# image ships /etc/crowdsec as a populated directory. crowdsec then loads the
# image-default /etc/crowdsec/config.yaml (no auto_registration) and ignores the
# chart's real config in /etc/crowdsec_data/. Result: agents never auto-validate
# and the agent DaemonSet CrashLoopBackOffs forever ("machine ... not validated").
# Fix: force the entrypoint to load the chart config via CONFIG_FILE (lapi.env below).

# ── LAPI (Local API — decision engine) ──────────────────────────────────────
lapi:
  enabled: true
  replicas: 1

  # Point crowdsec at the chart-provided config so its (working) default
  # config.yaml.local — which enables auto_registration — actually loads.
  # Without this, agents never validate and the agent DaemonSet crashloops.
  env:
    - name: CONFIG_FILE
      value: /etc/crowdsec_data/config.yaml

  # NOTE: a `lapi.config.config.yaml.local` override is NOT honored by chart 0.22.0
  # (verified live: the effective config uses the chart's own default ranges, not
  # ours). The chart default auto_registration.allowed_ranges is 10.0.0.0/8, which
  # covers the k3s pod CIDR (10.42.x) the agent registers from. Narrowing that range
  # (audit finding H-1) is therefore not achievable via values on this chart version;
  # it would need a chart upgrade or a post-render patch. Left as an accepted gap.

  metrics:
    enabled: true
    serviceMonitor:
      enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── Agent (DaemonSet — reads pod log files on each node) ────────────────────
agent:
  enabled: true

  # NEU: Zwingt den Agenten, den Node-Namen statt des zufälligen Pod-Namens zu nutzen
  env:
    - name: MACHINE_ID
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  # Log acquisition: Kubernetes-native pod log acquisition via the k8s API.
  # Logs are read as raw container stdout (no containerd JSON wrapper).
  # The 'program' value sets evt.Parsed.program, used by our custom parsers.
  acquisition:
    - namespace: tunenumbers
      podName: directus-*
      program: directus

    - namespace: monitoring
      podName: grafana-*
      program: grafana

    - namespace: gitea
      podName: gitea-*
      program: gitea

    - namespace: kube-system
      podName: traefik-*
      program: traefik

  # Mount custom parsers and scenario from ConfigMaps.
  # Parsers go into /etc/crowdsec/parsers/s01-parse/ (parse stage).
  # Scenario goes into /etc/crowdsec/scenarios/.
  extraVolumes:
    - name: parser-directus
      configMap:
        name: crowdsec-parser-directus
    - name: parser-grafana
      configMap:
        name: crowdsec-parser-grafana
    - name: parser-gitea
      configMap:
        name: crowdsec-parser-gitea
    - name: scenario-brute-force
      configMap:
        name: crowdsec-scenario-brute-force
    - name: parser-traefik-minio
      configMap:
        name: crowdsec-parser-traefik-minio

  extraVolumeMounts:
    - name: parser-directus
      mountPath: /etc/crowdsec/parsers/s01-parse/directus.yaml
      subPath: directus.yaml
    - name: parser-grafana
      mountPath: /etc/crowdsec/parsers/s01-parse/grafana.yaml
      subPath: grafana.yaml
    - name: parser-gitea
      mountPath: /etc/crowdsec/parsers/s01-parse/gitea.yaml
      subPath: gitea.yaml
    - name: scenario-brute-force
      mountPath: /etc/crowdsec/scenarios/brute-force.yaml
      subPath: brute-force.yaml
    - name: parser-traefik-minio
      mountPath: /etc/crowdsec/parsers/s01-parse/traefik-minio.yaml
      subPath: traefik-minio.yaml
