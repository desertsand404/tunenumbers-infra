# CrowdSec Helm values for tunenumbers.de
# Chart:     crowdsec/crowdsec  (helm repo add crowdsec https://crowdsec.github.io/helm-charts)
# Namespace: crowdsec
# Release:   crowdsec
#
# Prerequisites:
#   - Namespace 'crowdsec' must exist
#   - Secret 'smtp-credentials' must exist in 'crowdsec' namespace
#     (Ansible playbook 10-brute-force-protection.yml copies it from 'monitoring')
#   - ConfigMaps crowdsec-parser-{directus,grafana,gitea},
#     crowdsec-scenario-brute-force, crowdsec-email-notification
#     must be applied before or together with this Helm upgrade

# ── LAPI (Local API — decision engine) ──────────────────────────────────────
lapi:
  enabled: true
  replicas: 1

  metrics:
    enabled: true
    # serviceMonitor: false — Prometheus Operator not in use; scrape added via
    # prometheus-values.yaml extraScrapeConfigs instead.
    serviceMonitor:
      enabled: false

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

  # Inject SMTP credentials from the Secret copied by the Ansible playbook.
  # Used by the notification-setup init container (envsubst substitution).
  env:
    - name: SMTP_HOST
      valueFrom:
        secretKeyRef:
          name: smtp-credentials
          key: smtp_host
    - name: SMTP_PORT
      valueFrom:
        secretKeyRef:
          name: smtp-credentials
          key: smtp_port
    - name: SMTP_USER
      valueFrom:
        secretKeyRef:
          name: smtp-credentials
          key: smtp_user
    - name: SMTP_PASSWORD
      valueFrom:
        secretKeyRef:
          name: smtp-credentials
          key: smtp_password
    - name: SMTP_FROM
      valueFrom:
        secretKeyRef:
          name: smtp-credentials
          key: smtp_from

  # Init container: substitute ${SMTP_*} placeholders in the email notification
  # template and write the result to a shared emptyDir that is mounted over
  # /etc/crowdsec/notifications/ in the main LAPI container.
  initContainers:
    - name: notification-setup
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          sed \
            -e "s|\${SMTP_HOST}|${SMTP_HOST}|g" \
            -e "s|\${SMTP_PORT}|${SMTP_PORT}|g" \
            -e "s|\${SMTP_USER}|${SMTP_USER}|g" \
            -e "s|\${SMTP_PASSWORD}|${SMTP_PASSWORD}|g" \
            -e "s|\${SMTP_FROM}|${SMTP_FROM}|g" \
            /tmp/email-template.yaml > /etc/crowdsec-notifications/email.yaml
          echo "Notification config written."
      env:
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: smtp_host
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: smtp_port
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: smtp_user
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: smtp_password
        - name: SMTP_FROM
          valueFrom:
            secretKeyRef:
              name: smtp-credentials
              key: smtp_from
      volumeMounts:
        - name: email-notification-template
          mountPath: /tmp/email-template.yaml
          subPath: email-template.yaml
        - name: notifications-dir
          mountPath: /etc/crowdsec-notifications

  extraVolumes:
    # Template ConfigMap (placeholders substituted by init container)
    - name: email-notification-template
      configMap:
        name: crowdsec-email-notification
    # emptyDir filled by init container; mounted over /etc/crowdsec/notifications/
    - name: notifications-dir
      emptyDir: {}

  extraVolumeMounts:
    # Overlay /etc/crowdsec/notifications/ with the emptyDir populated by initContainer
    - name: notifications-dir
      mountPath: /etc/crowdsec/notifications
    # Override profiles.yaml to add email notification on every ban
    - name: email-notification-template
      mountPath: /etc/crowdsec/profiles.yaml
      subPath: profiles.yaml

# ── Agent (DaemonSet — reads pod log files on each node) ────────────────────
agent:
  enabled: true

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

  # Log acquisition: watch pod log files directly from the node's /var/log/pods/.
  # The glob patterns match k3s/containerd pod log directory structure:
  #   /var/log/pods/<namespace>_<pod-name>-<hash>_<uid>/<container>/<num>.log
  # Each matched line is a containerd JSON wrapper; our custom parsers handle unwrapping.
  acquis:
    - filenames:
        - /var/log/pods/tunenumbers_directus-*/**/*.log
      labels:
        type: directus

    - filenames:
        - /var/log/pods/monitoring_grafana-*/**/*.log
      labels:
        type: grafana

    - filenames:
        - /var/log/pods/gitea_gitea-*/**/*.log
      labels:
        type: gitea

  # Mount custom parsers and scenario from ConfigMaps.
  # Parsers go into /etc/crowdsec/parsers/s01-parse/ so they run in the parse stage.
  # Scenario goes into /etc/crowdsec/scenarios/.
  extraVolumes:
    - name: parser-directus
      configMap:
        name: crowdsec-parser-directus
    - name: parser-grafana
      configMap:
        name: crowdsec-parser-grafana
    - name: parser-gitea
      configMap:
        name: crowdsec-parser-gitea
    - name: scenario-brute-force
      configMap:
        name: crowdsec-scenario-brute-force

  extraVolumeMounts:
    - name: parser-directus
      mountPath: /etc/crowdsec/parsers/s01-parse/directus.yaml
      subPath: directus.yaml
    - name: parser-grafana
      mountPath: /etc/crowdsec/parsers/s01-parse/grafana.yaml
      subPath: grafana.yaml
    - name: parser-gitea
      mountPath: /etc/crowdsec/parsers/s01-parse/gitea.yaml
      subPath: gitea.yaml
    - name: scenario-brute-force
      mountPath: /etc/crowdsec/scenarios/brute-force.yaml
      subPath: brute-force.yaml
