apiVersion: apps/v1
kind: Deployment
metadata:
  name: directus
  namespace: tunenumbers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: directus
  template:
    metadata:
      labels:
        app: directus
    spec:
      nodeSelector:
        kubernetes.io/hostname: babel-it
      containers:
        - name: directus
          image: directus/directus:latest
          ports:
            - containerPort: 8055
          env:
            - name: PORT
              value: "8055"
            - name: DB_CLIENT
              value: "pg"
            - name: DB_HOST
              value: "postgresql.tunenumbers.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: "directus"
            - name: DB_USER
              value: "directus"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: directus-secret
                  key: DB_PASSWORD
            - name: SECRET
              valueFrom:
                secretKeyRef:
                  name: directus-secret
                  key: SECRET
            - name: ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: directus-secret
                  key: ADMIN_EMAIL
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: directus-secret
                  key: ADMIN_PASSWORD
            - name: PUBLIC_URL
              value: "https://cms.tunenumbers.de"
            - name: STORAGE_LOCATIONS
              value: "s3"
            - name: STORAGE_S3_DRIVER
              value: "s3"
            - name: STORAGE_S3_KEY
              valueFrom:
                secretKeyRef:
                  name: directus-secret
                  key: STORAGE_S3_KEY
            - name: STORAGE_S3_SECRET
              valueFrom:
                secretKeyRef:
                  name: directus-secret
                  key: STORAGE_S3_SECRET
            - name: STORAGE_S3_BUCKET
              value: "tunenumbers-media"
            - name: STORAGE_S3_ENDPOINT
              value: "http://minio.tunenumbers.svc.cluster.local:9000"
            - name: STORAGE_S3_REGION
              value: "us-east-1"
            - name: STORAGE_S3_FORCE_PATH_STYLE
              value: "true"
            - name: CORS_ENABLED
              value: "true"
            - name: CORS_ORIGIN
              value: "*"
            - name: CORS_METHODS
              value: "GET,POST,PATCH,PUT,DELETE,OPTIONS"
            - name: CORS_ALLOWED_HEADERS
              value: "Content-Type,Authorization,Range"
            - name: CORS_EXPOSED_HEADERS
              value: "Content-Range,Accept-Ranges,Content-Length"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /server/health
              port: 8055
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /server/health
              port: 8055
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /server/health
              port: 8055
            periodSeconds: 30
