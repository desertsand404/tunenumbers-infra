# Grafana alerting provisioning: brute-force ban alert.
# Applied as a ConfigMap in the 'monitoring' namespace with label grafana_alert=1.
# The Grafana alerts sidecar (enabled in grafana-values.yaml) auto-loads this.
#
# The Ansible playbook (10-brute-force-protection.yml) applies this file as:
#   kubectl create configmap grafana-alert-brute-force \
#     --from-file=brute-force-alert.yaml \
#     --namespace=monitoring --dry-run=client -o yaml | kubectl apply -f -
# And then labels it: kubectl label configmap ... grafana_alert=1 -n monitoring
apiVersion: 1
groups:
  - orgId: 1
    name: security
    folder: Alerts
    interval: 1m
    rules:
      - uid: brute-force-new-ban
        title: "New IP Banned — Brute Force"
        condition: C
        # Fire immediately (for: 0s) — each new ban should alert right away.
        for: 0s
        annotations:
          summary: "New IP banned: {{ $labels.ip }} (brute-force on tunenumbers.de)"
          description: "CrowdSec banned {{ $labels.ip }} after detecting repeated failed login attempts."
        labels:
          severity: warning
          team: ops
        data:
          # Query A: count new bans per IP from CrowdSec LAPI logs via Loki.
          # CrowdSec v1.7.x logs: level=info msg="new ban" ip=<IP> reason=... duration=...
          # sum by (ip) creates one series per banned IP — ip appears as a label in the alert.
          # NOTE: this rule is also provisioned via grafana-values.yaml alerting.rules.yaml
          # (authoritative). This file serves as a standalone reference copy.
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              expr: "sum by (ip) (count_over_time({namespace=\"crowdsec\"} |= \"new ban\" | logfmt | ip != \"\" [5m]))"
              refId: A
              queryType: range
          # Expression B: reduce A (time series) to a single scalar value
          - refId: B
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              refId: B
              reducer: last
              settings:
                mode: dropNN
          # Expression C: threshold — alert if any new bans appeared in last 5 min
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              refId: C
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
