# traefik.io/v1alpha1 confirmed via crowdsec/middleware.yml in this cluster
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`monitoring.tunenumbers.de`)
      kind: Rule
      services:
        - name: grafana
          port: 80
  tls:
    certResolver: letsencrypt
