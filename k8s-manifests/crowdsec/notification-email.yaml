apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-email-notification
  namespace: crowdsec
  labels:
    app.kubernetes.io/part-of: crowdsec
data:
  # Email notification plugin template.
  # ${SMTP_*} placeholders are substituted at pod startup by the init container
  # defined in helm/crowdsec/crowdsec-values.yaml using env vars from the
  # smtp-credentials Secret (copied from monitoring namespace by the Ansible playbook).
  email-template.yaml: |
    type: email
    name: email_default
    log_level: info
    format: |
      {{range . -}}
      A new IP has been banned on tunenumbers.de

      IP:       {{.Value}}
      Reason:   {{.Scenario}}
      Duration: {{.Duration}}
      Service:  {{.Labels.service}}

      To unblock: cscli decisions delete --ip {{.Value}}

      {{end -}}
    smtp_host: "${SMTP_HOST}"
    smtp_port: ${SMTP_PORT}
    smtp_username: "${SMTP_USER}"
    smtp_password: "${SMTP_PASSWORD}"
    smtp_ssl: true
    sender: "${SMTP_FROM}"
    receiver:
      - admin@tunenumbers.de
    email_subject: "[tunenumbers] IP {{range . }}{{.Value}}{{end}} banned - brute force"

  # CrowdSec profiles override: add email notification to every IP ban decision.
  # Mounted at /etc/crowdsec/profiles.yaml in the LAPI container.
  profiles.yaml: |
    name: default_ip_remediation
    filters:
      - Alert.Remediation == true && Alert.GetScope() == "Ip"
    decisions:
      - type: ban
        duration: 4h
    notifications:
      - email_default
    on_success: break
