apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-parser-traefik-minio
  namespace: crowdsec
  labels:
    crowdsec-parser: "1"
data:
  traefik-minio.yaml: |
    #
    # CrowdSec parser for MinIO auth failures via Traefik access logs.
    #
    # MinIO does not log auth failures to stdout. Traefik is the reverse proxy
    # for minio.tunenumbers.de and logs all requests in CLF format including
    # client IP and HTTP status. We detect 401 responses to the MinIO console
    # login endpoint.
    #
    # Traefik CLF log format:
    #   <IP> - - [date] "POST /api/v1/login HTTP/2.0" 401 <bytes> "-" "-" <reqid> "<router>" "<upstream>" <duration>
    #
    filter: "evt.Parsed.program == 'traefik'"
    name: tunenumbers/traefik-minio-failed-login
    description: "Detect MinIO console login failures via Traefik access logs (401 on /api/v1/login)"
    nodes:
      - grok:
          # Match POST to /api/v1/login (MinIO console login endpoint) returning 401
          pattern: '^(?P<source_ip>[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|[0-9a-fA-F:]{2,39})\s+\S+\s+\S+\s+\[.*?\]\s+"POST\s+/api/v1/login\s+\S+"\s+401\s'
          apply_on: message
        statics:
          - meta: log_type
            value: failed_login
          - meta: service
            value: minio
          - meta: source_ip
            expression: 'evt.Parsed["source_ip"]'

    onsuccess: next_stage
