apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-parser-grafana
  namespace: crowdsec
  labels:
    crowdsec-parser: "1"
data:
  grafana.yaml: |
    #
    # CrowdSec parser for Grafana (structured key=value log format)
    #
    # Grafana 12.x login failure log format (from authn service):
    #   logger=authn t=...Z level=warn msg="Failed to authenticate request" client=... error="invalid username or password" remoteAddr=1.2.3.4
    #   OR (legacy context logger):
    #   logger=context t=...Z level=warn msg="Invalid username or password" remoteAddr=1.2.3.4 uname=admin
    #
    filter: "evt.Parsed.program == 'grafana'"
    name: tunenumbers/grafana-failed-login
    description: "Parse Grafana failed login attempts (Grafana 12.x, multiple log formats)"
    nodes:
      # Match any Grafana log line containing the invalid credentials string,
      # followed by a remoteAddr field anywhere in the line.
      - grok:
          pattern: '(?i)(?:msg|error)="[^"]*invalid username or password[^"]*".*remoteAddr=(?P<source_ip>[0-9a-fA-F.:]+)'
          apply_on: message
        statics:
          - meta: log_type
            value: failed_login
          - meta: service
            value: grafana
          - meta: source_ip
            expression: 'evt.Parsed["source_ip"]'

      # remoteAddr before the invalid credentials string
      - grok:
          pattern: '(?i)remoteAddr=(?P<source_ip>[0-9a-fA-F.:]+).*(?:msg|error)="[^"]*invalid username or password[^"]*"'
          apply_on: message
        statics:
          - meta: log_type
            value: failed_login
          - meta: service
            value: grafana
          - meta: source_ip
            expression: 'evt.Parsed["source_ip"]'

    onsuccess: next_stage
