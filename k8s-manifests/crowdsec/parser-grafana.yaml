apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-parser-grafana
  namespace: crowdsec
  labels:
    crowdsec-parser: "1"
data:
  grafana.yaml: |
    #
    # CrowdSec parser for Grafana (structured key=value log format)
    #
    # Acquisition: k8s-native pod log acquisition (namespace=monitoring, podName=grafana-*, program=grafana)
    # Logs are raw Grafana key=value lines (no containerd wrapper) via the k8s API:
    #   t=2024-01-15T10:30:00Z lvl=warn msg="Invalid username or password" logger=context remoteAddr=1.2.3.4 uname=admin
    #
    filter: "evt.Parsed.program == 'grafana'"
    name: tunenumbers/grafana-failed-login
    description: "Parse Grafana failed login attempts from raw key=value pod logs"
    nodes:
      # Node 1: Match Grafana key=value log – msg before remoteAddr.
      # Fields may appear in either order; two nodes handle both orderings.
      - grok:
          pattern: '(?i)msg="invalid username or password".*remoteAddr=(?P<source_ip>[0-9a-fA-F.:]+)'
          apply_on: message
        statics:
          - meta: log_type
            value: failed_login
          - meta: service
            value: grafana
          - target: evt.SourceIp
            expression: 'evt.Parsed["source_ip"]'

      # Node 2: Match Grafana key=value log – remoteAddr before msg.
      - grok:
          pattern: '(?i)remoteAddr=(?P<source_ip>[0-9a-fA-F.:]+).*msg="invalid username or password"'
          apply_on: message
        statics:
          - meta: log_type
            value: failed_login
          - meta: service
            value: grafana
          - target: evt.SourceIp
            expression: 'evt.Parsed["source_ip"]'

    onsuccess: next_stage
