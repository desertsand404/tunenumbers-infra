apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-parser-directus
  namespace: crowdsec
  labels:
    crowdsec-parser: "1"
data:
  directus.yaml: |
    #
    # CrowdSec parser for Directus CMS (pino JSON logger)
    #
    # Acquisition: k8s-native pod log acquisition (namespace=tunenumbers, podName=directus-*, program=directus)
    # Logs are raw pino JSON lines (no containerd wrapper) via the k8s API:
    #   {"level":30,"time":1707000000000,"msg":"","url":"/auth/login","method":"POST","status":401,"ip":"1.2.3.4",...}
    #
    filter: "evt.Parsed.program == 'directus'"
    name: tunenumbers/directus-failed-login
    description: "Parse Directus CMS failed login attempts from raw pino JSON pod logs"
    nodes:
      # Node 1: Match pino JSON – ip field before status field.
      # Directus failed login: POST /auth/login returns 401.
      # Pino field order is non-deterministic; two nodes cover both orderings.
      - grok:
          pattern: '"method":"POST".*"url":"\/auth\/login".*"ip":"(?P<source_ip>[0-9a-fA-F.:]+)".*"status":401'
          apply_on: message
        statics:
          - meta: log_type
            value: failed_login
          - meta: service
            value: directus
          - target: evt.SourceIp
            expression: "evt.GroksVars[\"source_ip\"]"

      # Node 2: Match pino JSON – status field before ip field.
      - grok:
          pattern: '"method":"POST".*"url":"\/auth\/login".*"status":401.*"ip":"(?P<source_ip>[0-9a-fA-F.:]+)"'
          apply_on: message
        statics:
          - meta: log_type
            value: failed_login
          - meta: service
            value: directus
          - target: evt.SourceIp
            expression: "evt.GroksVars[\"source_ip\"]"

    onsuccess: next_stage
