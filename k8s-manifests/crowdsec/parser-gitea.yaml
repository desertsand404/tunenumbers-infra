apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-parser-gitea
  namespace: crowdsec
  labels:
    crowdsec-parser: "1"
data:
  gitea.yaml: |
    #
    # CrowdSec parser for Gitea (text log format via k3s containerd)
    #
    # Acquisition type label: type=gitea
    # Pod log path on host:
    #   /var/log/pods/gitea_gitea-*/**/*.log
    #
    # Gitea default text log format (stdout):
    #   2024/01/15 10:30:00 ...modules/auth/auth_service.go:234:UserSignIn() [W] Failed authentication attempt for user admin from 1.2.3.4
    #
    # k3s containerd wraps these lines:
    #   {"log":"2024/01/15 10:30:00 ... [W] Failed authentication attempt for user admin from 1.2.3.4\n","stream":"stdout","time":"..."}
    #
    filter: "evt.Parsed.program == 'gitea' || evt.Parsed.type == 'gitea'"
    name: tunenumbers/gitea-failed-login
    description: "Parse Gitea failed authentication attempts from k3s containerd JSON-wrapped pod logs"
    nodes:
      # Node 1: Unwrap the containerd/k3s JSON envelope.
      # Extracts the inner Gitea log line into evt.Parsed.inner_log.
      - grok:
          pattern: '^\{"log":"(?P<inner_log>(?:[^"\\]|\\.)*)\\n?","stream":"[^"]*","time":"[^"]*"\}$'
          apply_on: message
        statics:
          - target: evt.Parsed.inner_log
            expression: "evt.GroksVars[\"inner_log\"]"

      # Node 2: Match Gitea failed authentication lines and capture the source IP.
      # Covers log messages from Gitea 1.18–1.21+:
      #   [W] Failed authentication attempt for user <user> from <ip>
      #   [W] Failed to authenticate user "<user>" from <ip>
      #   [W] failed to sign in ... from <ip>
      # Supports both IPv4 and IPv6 source addresses.
      - grok:
          pattern: '(?i)(?:Failed authentication attempt|Failed to authenticate|failed to sign in).{0,120}from\s+(?P<source_ip>[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|[0-9a-fA-F:]{2,39})'
          apply_on: inner_log
        statics:
          - meta: log_type
            value: failed_login
          - meta: service
            value: gitea
          - target: evt.SourceIp
            expression: "evt.GroksVars[\"source_ip\"]"

    onsuccess: next_stage
