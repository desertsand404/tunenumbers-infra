apiVersion: v1
kind: ConfigMap
metadata:
  name: crowdsec-parser-gitea
  namespace: crowdsec
  labels:
    crowdsec-parser: "1"
data:
  gitea.yaml: |
    #
    # CrowdSec parser for Gitea (text log format)
    #
    # Acquisition: k8s-native pod log acquisition (namespace=gitea, podName=gitea-*, program=gitea)
    # Logs are raw Gitea text lines (no containerd wrapper) via the k8s API:
    #   2024/01/15 10:30:00 ...modules/auth/auth_service.go:234:UserSignIn() [W] Failed authentication attempt for user admin from 1.2.3.4
    #
    filter: "evt.Parsed.program == 'gitea'"
    name: tunenumbers/gitea-failed-login
    description: "Parse Gitea failed authentication attempts from raw text pod logs"
    nodes:
      # Match Gitea failed authentication lines and capture the source IP.
      # Covers log messages from Gitea 1.18–1.21+:
      #   [W] Failed authentication attempt for user <user> from <ip>
      #   [W] Failed to authenticate user "<user>" from <ip>
      #   [W] failed to sign in ... from <ip>
      # Supports both IPv4 and IPv6 source addresses.
      - grok:
          pattern: '(?i)(?:Failed authentication attempt|Failed to authenticate|failed to sign in).{0,120}from\s+(?P<source_ip>[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}|[0-9a-fA-F:]{2,39})'
          apply_on: message
        statics:
          - meta: log_type
            value: failed_login
          - meta: service
            value: gitea
          - target: evt.SourceIp
            expression: 'evt.Parsed["source_ip"]'

    onsuccess: next_stage
