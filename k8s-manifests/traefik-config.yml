apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    service:
      externalTrafficPolicy: Local
    experimental:
      plugins:
        crowdsec:
          moduleName: "github.com/maxiere/traefik-bouncer"
          version: "v0.7.2"