apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: tunenumbers
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Traefik (kube-system) is the trusted ingress front door — allowed to reach
# any pod in this namespace on any port it might route to.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: tunenumbers
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
---
# Prometheus / postgres-exporter (monitoring namespace) scrape PostgreSQL and MinIO directly.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape-postgresql
  namespace: tunenumbers
spec:
  podSelector:
    matchLabels:
      app: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-scrape-minio
  namespace: tunenumbers
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9000
---
# Directus and Umami are the only in-namespace clients of PostgreSQL.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-to-postgresql
  namespace: tunenumbers
spec:
  podSelector:
    matchLabels:
      app: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: directus
        - podSelector:
            matchLabels:
              app: umami
      ports:
        - protocol: TCP
          port: 5432
---
# Directus is the only in-namespace client of MinIO (S3 storage backend).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-directus-to-minio
  namespace: tunenumbers
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: directus
      ports:
        - protocol: TCP
          port: 9000
---
# Astro SSR fetches Directus content server-side, not just through the public
# ingress (found live: default-deny-ingress blocked this, breaking the
# homepage's CMS content fetch with ECONNREFUSED).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-astro-to-directus
  namespace: tunenumbers
spec:
  podSelector:
    matchLabels:
      app: directus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: astro-frontend
      ports:
        - protocol: TCP
          port: 8055
---
# Astro reports pageviews to Umami server-side.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-astro-to-umami
  namespace: tunenumbers
spec:
  podSelector:
    matchLabels:
      app: umami
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: astro-frontend
      ports:
        - protocol: TCP
          port: 3000
