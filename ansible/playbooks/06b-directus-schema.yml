---
- name: Phase 6b — Apply Directus schema and seed data
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/main.yml
    - ../vars/secrets.yml
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  tasks:
    - name: Check if schema snapshot file exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../directus-schema/snapshot.yaml"
      register: schema_file

    - name: Apply Directus schema snapshot
      when: schema_file.stat.exists
      block:
        - name: Copy schema snapshot into Directus pod
          ansible.builtin.command: >
            kubectl -n {{ namespaces.app }} cp
            {{ playbook_dir }}/../../directus-schema/snapshot.yaml
            $(kubectl -n {{ namespaces.app }} get pod -l app=directus -o jsonpath='{.items[0].metadata.name}'):/tmp/snapshot.yaml

        - name: Apply schema via Directus CLI
          ansible.builtin.command: >
            kubectl -n {{ namespaces.app }} exec deployment/directus --
            npx directus schema apply /tmp/snapshot.yaml --yes
          register: schema_apply
          changed_when: "'applied' in schema_apply.stdout"
