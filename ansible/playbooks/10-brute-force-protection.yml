---
- name: Phase 10 — Brute-force protection (CrowdSec enhancements + Grafana security dashboard)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../vars/secrets.yml"
  environment:
    KUBECONFIG: /home/github-runner/.kube/config
  vars:
    crowdsec_namespace: crowdsec
    monitoring_namespace: monitoring

  tasks:
    # ── Prerequisites ────────────────────────────────────────────────────────

    - name: Verify smtp-credentials Secret exists in monitoring namespace
      ansible.builtin.command:
        cmd: kubectl get secret smtp-credentials -n {{ monitoring_namespace }}
      register: smtp_secret_check
      failed_when: smtp_secret_check.rc != 0
      changed_when: false

    - name: Verify crowdsec namespace exists
      ansible.builtin.command:
        cmd: kubectl get namespace {{ crowdsec_namespace }}
      register: crowdsec_ns_check
      failed_when: crowdsec_ns_check.rc != 0
      changed_when: false

    # ── Copy SMTP Secret to crowdsec namespace ───────────────────────────────

    - name: Copy smtp-credentials Secret from monitoring to crowdsec namespace
      ansible.builtin.shell: |
        kubectl get secret smtp-credentials -n {{ monitoring_namespace }} -o json \
          | python3 -c "
        import json, sys
        s = json.load(sys.stdin)
        s['metadata']['namespace'] = '{{ crowdsec_namespace }}'
        for k in ['resourceVersion', 'uid', 'creationTimestamp']:
            s['metadata'].pop(k, None)
        s['metadata'].pop('annotations', None)
        print(json.dumps(s))
        " \
          | kubectl apply -f -
      changed_when: true
      no_log: true

    # ── CrowdSec ConfigMaps ───────────────────────────────────────────────────

    - name: Apply CrowdSec parser ConfigMaps (Directus, Grafana, Gitea)
      ansible.builtin.command:
        cmd: >
          kubectl apply -f
          {{ playbook_dir }}/../../k8s-manifests/crowdsec/{{ item }}
      loop:
        - parser-directus.yaml
        - parser-grafana.yaml
        - parser-gitea.yaml
      changed_when: true

    - name: Apply CrowdSec brute-force scenario ConfigMap
      ansible.builtin.command:
        cmd: >
          kubectl apply -f
          {{ playbook_dir }}/../../k8s-manifests/crowdsec/scenario-brute-force.yaml
      changed_when: true

    - name: Apply CrowdSec email notification ConfigMap
      ansible.builtin.command:
        cmd: >
          kubectl apply -f
          {{ playbook_dir }}/../../k8s-manifests/crowdsec/notification-email.yaml
      changed_when: true

    # ── CrowdSec Helm upgrade ─────────────────────────────────────────────────

    - name: Add CrowdSec Helm repository
      ansible.builtin.command:
        cmd: helm repo add crowdsec https://crowdsec.github.io/helm-charts --force-update
      changed_when: true

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false

    - name: Upgrade CrowdSec Helm release with Prometheus metrics + email notification
      ansible.builtin.command:
        cmd: >
          helm upgrade --install crowdsec crowdsec/crowdsec
          --namespace {{ crowdsec_namespace }}
          --values {{ playbook_dir }}/../../helm/crowdsec/crowdsec-values.yaml
          --wait
          --timeout 10m0s
          --cleanup-on-fail
      changed_when: true

    # ── Grafana security dashboard ────────────────────────────────────────────

    - name: Create Grafana security-overview dashboard ConfigMap
      ansible.builtin.shell: |
        kubectl create configmap grafana-dashboard-security-overview \
          --from-file=security-overview.json={{ playbook_dir }}/../../k8s-manifests/grafana/dashboards/security-overview.json \
          --namespace={{ monitoring_namespace }} \
          --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    - name: Label security-overview dashboard ConfigMap for sidecar pickup
      ansible.builtin.command:
        cmd: >
          kubectl label configmap grafana-dashboard-security-overview
          grafana_dashboard=1
          --namespace={{ monitoring_namespace }}
          --overwrite
      changed_when: true

    # ── Grafana brute-force alert rule ────────────────────────────────────────

    - name: Create Grafana brute-force alert rule ConfigMap
      ansible.builtin.shell: |
        kubectl create configmap grafana-alert-brute-force \
          --from-file=brute-force-alert.yaml={{ playbook_dir }}/../../k8s-manifests/grafana/alerts/brute-force-alert.yaml \
          --namespace={{ monitoring_namespace }} \
          --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    - name: Label brute-force alert ConfigMap for sidecar pickup
      ansible.builtin.command:
        cmd: >
          kubectl label configmap grafana-alert-brute-force
          grafana_alert=1
          --namespace={{ monitoring_namespace }}
          --overwrite
      changed_when: true

    # ── Grafana Helm upgrade (adds SMTP + alerts sidecar) ────────────────────

    - name: Upgrade Grafana Helm release with SMTP configuration and alerts sidecar
      ansible.builtin.command:
        cmd: >
          helm upgrade --install grafana grafana/grafana
          --version 10.5.15
          --namespace {{ monitoring_namespace }}
          --values {{ playbook_dir }}/../../helm/monitoring/grafana-values.yaml
          --wait
          --timeout 10m0s
          --cleanup-on-fail
      changed_when: true

    # ── Prometheus Helm upgrade (adds CrowdSec scrape job) ───────────────────

    - name: Upgrade Prometheus Helm release with CrowdSec scrape config
      ansible.builtin.command:
        cmd: >
          helm upgrade --install prometheus prometheus-community/prometheus
          --version 28.9.1
          --namespace {{ monitoring_namespace }}
          --values {{ playbook_dir }}/../../helm/monitoring/prometheus-values.yaml
          --wait
          --timeout 10m0s
          --cleanup-on-fail
      changed_when: true

    # ── Verification ──────────────────────────────────────────────────────────

    - name: Wait for CrowdSec LAPI pod to be ready
      ansible.builtin.command:
        cmd: >
          kubectl wait pod
          --for=condition=Ready
          --selector=app.kubernetes.io/component=lapi
          --namespace={{ crowdsec_namespace }}
          --timeout=300s
      changed_when: false
      failed_when: false

    - name: Verify CrowdSec decisions endpoint is reachable
      ansible.builtin.command:
        cmd: >
          kubectl exec -n {{ crowdsec_namespace }}
          deployment/crowdsec-lapi --
          cscli decisions list
      register: decisions_check
      changed_when: false
      failed_when: false

    - name: Print active CrowdSec decisions
      ansible.builtin.debug:
        msg: "{{ decisions_check.stdout_lines | default(['(could not reach cscli — verify manually)']) }}"

    - name: Brute-force protection deployment complete
      ansible.builtin.debug:
        msg: |
          Brute-force protection deployed successfully.

          CrowdSec parses failed logins from Directus, Grafana, and Gitea.
          IPs with 5+ failed attempts per 60s are banned for 4 hours.
          Email alerts are sent to admin@tunenumbers.de on each new ban.

          Security dashboard: https://monitoring.tunenumbers.de
            → Dashboard: "Security Overview"

          Useful commands (run on VPS with KUBECONFIG set):
            cscli decisions list
            cscli decisions delete --ip <IP>
            cscli metrics
            kubectl logs -n crowdsec deployment/crowdsec-lapi --tail=50
