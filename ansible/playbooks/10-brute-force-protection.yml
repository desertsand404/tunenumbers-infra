---
- name: Phase 10 — Brute-force protection (CrowdSec enhancements + Grafana security dashboard)
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "{{ playbook_dir }}/../vars/secrets.yml"
  environment:
    KUBECONFIG: /home/github-runner/.kube/config
  vars:
    crowdsec_namespace: crowdsec
    monitoring_namespace: monitoring

  tasks:
    # ── Prerequisites ────────────────────────────────────────────────────────

    - name: Verify smtp-credentials Secret exists in monitoring namespace
      ansible.builtin.command:
        cmd: kubectl get secret smtp-credentials -n {{ monitoring_namespace }}
      register: smtp_secret_check
      failed_when: smtp_secret_check.rc != 0
      changed_when: false

    - name: Verify crowdsec namespace exists
      ansible.builtin.command:
        cmd: kubectl get namespace {{ crowdsec_namespace }}
      register: crowdsec_ns_check
      failed_when: crowdsec_ns_check.rc != 0
      changed_when: false

    # ── CrowdSec ConfigMaps ───────────────────────────────────────────────────

    - name: Apply CrowdSec parser ConfigMaps (Directus, Grafana, Gitea)
      ansible.builtin.command:
        cmd: >
          kubectl apply -f
          {{ playbook_dir }}/../../k8s-manifests/crowdsec/{{ item }}
      loop:
        - parser-directus.yaml
        - parser-grafana.yaml
        - parser-gitea.yaml
      changed_when: true

    - name: Apply CrowdSec brute-force scenario ConfigMap
      ansible.builtin.command:
        cmd: >
          kubectl apply -f
          {{ playbook_dir }}/../../k8s-manifests/crowdsec/scenario-brute-force.yaml
      changed_when: true

    # ── CrowdSec Helm upgrade ─────────────────────────────────────────────────

    - name: Add CrowdSec Helm repository
      ansible.builtin.command:
        cmd: helm repo add crowdsec https://crowdsecurity.github.io/helm-charts --force-update
      changed_when: true

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false

    - name: Upgrade CrowdSec Helm release with Prometheus metrics
      ansible.builtin.command:
        cmd: >
          helm upgrade --install crowdsec crowdsec/crowdsec
          --namespace {{ crowdsec_namespace }}
          --values {{ playbook_dir }}/../../helm/crowdsec/crowdsec-values.yaml
          --wait
          --timeout 10m0s
          --cleanup-on-fail
      changed_when: true

    # ── Notification config: create rendered Secret + patch deployment ────────
    #
    # lapi.extraVolumeMounts is ignored by this chart version, so we:
    #  1. Read SMTP credentials from the smtp-credentials Secret in monitoring ns
    #  2. Create crowdsec-notification-config Secret in crowdsec ns with:
    #       email.yaml  — fully rendered with real SMTP credentials
    #       profiles.yaml — overrides default to add email_default notification
    #  3. kubectl patch the LAPI deployment to mount both files
    #  4. Rollout restart so the pod picks up the updated Secret
    #
    # This block runs after every helm upgrade (which would otherwise wipe the patch).

    - name: Create crowdsec-notification-config Secret with rendered SMTP credentials
      ansible.builtin.shell:
        cmd: |
          python3 << 'PYEOF'
          import subprocess, base64, tempfile, os

          # Use chr() so that {{ }} are built at Python runtime and never seen by
          # Ansible's Jinja2 engine during task rendering.
          ob = chr(123) * 2   # open
          cb = chr(125) * 2   # close

          def get_val(key):
              r = subprocess.run(
                  ['kubectl', 'get', 'secret', 'smtp-credentials',
                   '-n', 'monitoring', '-o', 'jsonpath={.data.' + key + '}'],
                  capture_output=True, text=True, check=True)
              return base64.b64decode(r.stdout.strip()).decode()

          h  = get_val('smtp_host')
          p  = get_val('smtp_port')
          u  = get_val('smtp_user')
          pw = get_val('smtp_password')
          fr = get_val('smtp_from')

          email_yaml = '\n'.join([
              'type: email',
              'name: email_default',
              'log_level: info',
              'timeout: 20s',
              'format: |',
              '  ' + ob + 'range . -' + cb,
              '  A new IP has been banned on tunenumbers.de',
              '',
              '  IP:       ' + ob + '.Value' + cb,
              '  Reason:   ' + ob + '.Scenario' + cb,
              '  Duration: ' + ob + '.Duration' + cb,
              '  Service:  ' + ob + '.Labels.service' + cb,
              '',
              '  To unblock: cscli decisions delete --ip ' + ob + '.Value' + cb,
              '',
              '  ' + ob + 'end -' + cb,
              'smtp_host: "' + h + '"',
              'smtp_port: ' + p,
              'smtp_username: "' + u + '"',
              'smtp_password: "' + pw + '"',
              'smtp_ssl: true',
              'sender: "' + fr + '"',
              'receiver_emails:',
              '  - admin@tunenumbers.de',
              'email_subject: "[tunenumbers] IP '
              + ob + 'range . ' + cb
              + ob + '.Value' + cb
              + ob + 'end' + cb
              + ' banned - brute force"',
          ]) + '\n'

          profiles_yaml = '\n'.join([
              'name: default_ip_remediation',
              'filters:',
              '  - Alert.Remediation == true && Alert.GetScope() == "Ip"',
              'decisions:',
              '  - type: ban',
              '    duration: 4h',
              'notifications:',
              '  - email_default',
              'on_success: break',
          ]) + '\n'

          fe = tempfile.NamedTemporaryFile(mode='w', suffix='-email.yaml',   delete=False)
          fp = tempfile.NamedTemporaryFile(mode='w', suffix='-profiles.yaml', delete=False)
          fe.write(email_yaml);    fe.close()
          fp.write(profiles_yaml); fp.close()

          try:
              dry = subprocess.run(
                  ['kubectl', 'create', 'secret', 'generic',
                   'crowdsec-notification-config',
                   '--namespace=crowdsec',
                   '--from-file=email.yaml='    + fe.name,
                   '--from-file=profiles.yaml=' + fp.name,
                   '--dry-run=client', '-o', 'yaml'],
                  capture_output=True, text=True, check=True)
              subprocess.run(
                  ['kubectl', 'apply', '-f', '-'],
                  input=dry.stdout, text=True, check=True)
              print('Secret crowdsec-notification-config created/updated')
          finally:
              os.unlink(fe.name)
              os.unlink(fp.name)
          PYEOF
      no_log: true
      changed_when: true

    - name: Patch LAPI deployment to mount crowdsec-notification-config Secret
      ansible.builtin.shell: >
        kubectl patch deployment crowdsec-lapi -n {{ crowdsec_namespace }}
        --type=strategic -p
        '{"spec":{"template":{"spec":{
          "volumes":[{"name":"notification-config","secret":{"secretName":"crowdsec-notification-config"}}],
          "containers":[{"name":"crowdsec-lapi","volumeMounts":[
            {"name":"notification-config","mountPath":"/etc/crowdsec/notifications/email.yaml","subPath":"email.yaml"},
            {"name":"notification-config","mountPath":"/etc/crowdsec/profiles.yaml","subPath":"profiles.yaml"}
          ]}]
        }}}}'
      changed_when: true

    - name: Restart LAPI to apply notification config
      ansible.builtin.command:
        cmd: kubectl rollout restart deployment/crowdsec-lapi -n {{ crowdsec_namespace }}
      changed_when: true

    - name: Wait for LAPI rollout to complete
      ansible.builtin.command:
        cmd: >
          kubectl rollout status deployment/crowdsec-lapi
          -n {{ crowdsec_namespace }}
          --timeout=120s
      changed_when: false

    # ── Grafana security dashboard ────────────────────────────────────────────

    - name: Create Grafana security-overview dashboard ConfigMap
      ansible.builtin.shell: |
        kubectl create configmap grafana-dashboard-security-overview \
          --from-file=security-overview.json={{ playbook_dir }}/../../k8s-manifests/grafana/dashboards/security-overview.json \
          --namespace={{ monitoring_namespace }} \
          --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    - name: Label security-overview dashboard ConfigMap for sidecar pickup
      ansible.builtin.command:
        cmd: >
          kubectl label configmap grafana-dashboard-security-overview
          grafana_dashboard=1
          --namespace={{ monitoring_namespace }}
          --overwrite
      changed_when: true

    # ── Grafana brute-force alert rule ────────────────────────────────────────

    - name: Create Grafana brute-force alert rule ConfigMap
      ansible.builtin.shell: |
        kubectl create configmap grafana-alert-brute-force \
          --from-file=brute-force-alert.yaml={{ playbook_dir }}/../../k8s-manifests/grafana/alerts/brute-force-alert.yaml \
          --namespace={{ monitoring_namespace }} \
          --dry-run=client -o yaml | kubectl apply -f -
      changed_when: true

    - name: Label brute-force alert ConfigMap for sidecar pickup
      ansible.builtin.command:
        cmd: >
          kubectl label configmap grafana-alert-brute-force
          grafana_alert=1
          --namespace={{ monitoring_namespace }}
          --overwrite
      changed_when: true

    # ── Grafana Helm upgrade (adds SMTP + alerts sidecar) ────────────────────

    - name: Upgrade Grafana Helm release with SMTP configuration and alerts sidecar
      ansible.builtin.command:
        cmd: >
          helm upgrade --install grafana grafana/grafana
          --version 10.5.15
          --namespace {{ monitoring_namespace }}
          --values {{ playbook_dir }}/../../helm/monitoring/grafana-values.yaml
          --wait
          --timeout 10m0s
          --cleanup-on-fail
      changed_when: true

    # ── Prometheus Helm upgrade (adds CrowdSec scrape job) ───────────────────

    - name: Upgrade Prometheus Helm release with CrowdSec scrape config
      ansible.builtin.command:
        cmd: >
          helm upgrade --install prometheus prometheus-community/prometheus
          --version 28.9.1
          --namespace {{ monitoring_namespace }}
          --values {{ playbook_dir }}/../../helm/monitoring/prometheus-values.yaml
          --wait
          --timeout 10m0s
          --cleanup-on-fail
      changed_when: true

    # ── Verification ──────────────────────────────────────────────────────────

    - name: Verify email.yaml has real SMTP credentials (not empty fields)
      ansible.builtin.command:
        cmd: >
          kubectl exec -n {{ crowdsec_namespace }}
          deployment/crowdsec-lapi --
          grep -c smtp_host /etc/crowdsec/notifications/email.yaml
      register: email_check
      changed_when: false
      failed_when: false

    - name: Verify profiles.yaml has email_default notification
      ansible.builtin.command:
        cmd: >
          kubectl exec -n {{ crowdsec_namespace }}
          deployment/crowdsec-lapi --
          grep -c email_default /etc/crowdsec/profiles.yaml
      register: profile_check
      changed_when: false
      failed_when: false

    - name: Verify CrowdSec decisions endpoint is reachable
      ansible.builtin.command:
        cmd: >
          kubectl exec -n {{ crowdsec_namespace }}
          deployment/crowdsec-lapi --
          cscli decisions list
      register: decisions_check
      changed_when: false
      failed_when: false

    - name: Print active CrowdSec decisions
      ansible.builtin.debug:
        msg: "{{ decisions_check.stdout_lines | default(['(could not reach cscli — verify manually)']) }}"

    - name: Brute-force protection deployment complete
      ansible.builtin.debug:
        msg: |
          Brute-force protection deployed successfully.

          CrowdSec parses failed logins from Directus, Grafana, and Gitea.
          IPs with 5+ failed attempts per 60s are banned for 4 hours.
          Email alerts are sent to admin@tunenumbers.de on each new ban.

          Security dashboard: https://monitoring.tunenumbers.de
            → Dashboard: "Security Overview"

          Useful commands (run on VPS with KUBECONFIG set):
            cscli decisions list
            cscli decisions delete --ip <IP>
            cscli metrics
            kubectl logs -n crowdsec deployment/crowdsec-lapi --tail=50
