---
- name: Phase 9 — Integrate CrowdSec with Traefik
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/main.yml
    - ../vars/secrets.yml
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  tasks:
    - name: Apply Traefik Plugin Config
      ansible.builtin.command: kubectl apply -f {{ playbook_dir }}/../../k8s-manifests/traefik-config.yml
      register: traefik_config
      changed_when: "'created' in traefik_config.stdout or 'configured' in traefik_config.stdout"

    - name: Template CrowdSec Middleware
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../../k8s-manifests/crowdsec/middleware.yml.j2"
        dest: /tmp/crowdsec-middleware.yml
        mode: "0600"

    - name: Apply CrowdSec Middleware
      ansible.builtin.command: kubectl apply -f /tmp/crowdsec-middleware.yml
      register: crowdsec_middleware
      changed_when: "'created' in crowdsec_middleware.stdout or 'configured' in crowdsec_middleware.stdout"

    - name: Remove templated middleware file
      ansible.builtin.file:
        path: /tmp/crowdsec-middleware.yml
        state: absent

    - name: Update Directus Ingress with Middleware
      ansible.builtin.command: kubectl apply -f {{ playbook_dir }}/../../k8s-manifests/directus/ingress.yml
      register: directus_ingress
      changed_when: "'created' in directus_ingress.stdout or 'configured' in directus_ingress.stdout"
