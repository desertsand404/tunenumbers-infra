---
- name: Deploy Monitoring Stack
  hosts: localhost
  connection: local
  gather_facts: false
  environment:
    KUBECONFIG: /home/github-runner/.kube/config
  vars:
    monitoring_namespace: monitoring
    helm_charts:
      - repo_name: prometheus-community
        repo_url: https://prometheus-community.github.io/helm-charts
        chart: prometheus-community/prometheus
        release: prometheus
        version: "28.9.1"
        values_file: "{{ playbook_dir }}/../../helm/monitoring/prometheus-values.yaml"
      - repo_name: grafana
        repo_url: https://grafana.github.io/helm-charts
        chart: grafana/loki
        release: loki
        version: "6.53.0"
        values_file: "{{ playbook_dir }}/../../helm/monitoring/loki-values.yaml"
      - repo_name: grafana
        repo_url: https://grafana.github.io/helm-charts
        chart: grafana/grafana
        release: grafana
        version: "10.5.15"
        values_file: "{{ playbook_dir }}/../../helm/monitoring/grafana-values.yaml"
      - repo_name: grafana
        repo_url: https://grafana.github.io/helm-charts
        chart: grafana/alloy
        release: alloy
        version: "1.6.0"
        values_file: "{{ playbook_dir }}/../../helm/monitoring/alloy-values.yaml"

  tasks:
    - name: Clear any pending Helm release locks
      ansible.builtin.shell: |
        kubectl get secrets -n {{ monitoring_namespace }} \
          -l owner=helm \
          -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.metadata.labels.status}{"\n"}{end}' \
          | awk '$2 ~ /^pending/ {print $1}' \
          | xargs -r kubectl delete secret -n {{ monitoring_namespace }}
      changed_when: false
      failed_when: false

    - name: Create monitoring namespace
      ansible.builtin.command:
        cmd: kubectl apply -f {{ playbook_dir }}/../../k8s-manifests/monitoring/namespace.yaml
      changed_when: true

    - name: Check if grafana-admin-secret exists
      ansible.builtin.command:
        cmd: kubectl get secret grafana-admin-secret -n {{ monitoring_namespace }}
      register: grafana_secret
      failed_when: false
      changed_when: false

    - name: Fail if grafana-admin-secret does not exist
      ansible.builtin.fail:
        msg: |
          grafana-admin-secret not found in namespace {{ monitoring_namespace }}.
          Create it first:
          kubectl create secret generic grafana-admin-secret \
            --from-literal=admin-user=admin \
            --from-literal=admin-password='YOUR_SECURE_PASSWORD' \
            -n monitoring
      when: grafana_secret.rc != 0

    - name: Add Helm repositories
      ansible.builtin.command:
        cmd: helm repo add {{ item.repo_name }} {{ item.repo_url }} --force-update
      loop: "{{ helm_charts }}"
      loop_control:
        label: "{{ item.repo_name }}"
      changed_when: true

    - name: Update Helm repos
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false

    - name: Deploy Helm charts
      ansible.builtin.command:
        cmd: >
          helm upgrade --install {{ item.release }} {{ item.chart }}
          --version {{ item.version }}
          --namespace {{ monitoring_namespace }}
          --values {{ item.values_file }}
          --wait
          --timeout 10m0s
          --cleanup-on-fail
      loop: "{{ helm_charts }}"
      loop_control:
        label: "{{ item.release }}"
      changed_when: true

    - name: Apply Traefik IngressRoute for Grafana
      ansible.builtin.command:
        cmd: kubectl apply -f {{ playbook_dir }}/../../k8s-manifests/monitoring/grafana-ingressroute.yaml
      changed_when: true

    - name: Wait for Grafana pod to be ready
      ansible.builtin.command:
        cmd: >
          kubectl wait pod
          --for=condition=Ready
          --selector=app.kubernetes.io/name=grafana
          --namespace={{ monitoring_namespace }}
          --timeout=300s
      changed_when: false

    - name: Monitoring stack deployment complete
      ansible.builtin.debug:
        msg: |
          Monitoring stack deployed.
          Grafana: https://monitoring.tunenumbers.de
          Login credentials: kubectl get secret grafana-admin-secret -n monitoring -o jsonpath='{.data.admin-password}' | base64 -d
