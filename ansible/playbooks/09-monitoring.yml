---
- name: Deploy Monitoring Stack
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    monitoring_namespace: monitoring
    helm_charts:
      prometheus:
        repo_name: prometheus-community
        repo_url: https://prometheus-community.github.io/helm-charts
        chart: prometheus-community/prometheus
        release: prometheus
        version: "28.9.1"
        values_file: "{{ playbook_dir }}/../../helm/monitoring/prometheus-values.yaml"
      loki:
        repo_name: grafana
        repo_url: https://grafana.github.io/helm-charts
        chart: grafana/loki
        release: loki
        version: "6.53.0"
        values_file: "{{ playbook_dir }}/../../helm/monitoring/loki-values.yaml"
      grafana:
        repo_name: grafana
        repo_url: https://grafana.github.io/helm-charts
        chart: grafana/grafana
        release: grafana
        version: "10.5.15"
        values_file: "{{ playbook_dir }}/../../helm/monitoring/grafana-values.yaml"
      alloy:
        repo_name: grafana
        repo_url: https://grafana.github.io/helm-charts
        chart: grafana/alloy
        release: alloy
        version: "1.6.0"
        values_file: "{{ playbook_dir }}/../../helm/monitoring/alloy-values.yaml"

  tasks:
    - name: Create monitoring namespace
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k8s-manifests/monitoring/namespace.yaml"

    - name: Check if grafana-admin-secret exists
      kubernetes.core.k8s_info:
        kind: Secret
        name: grafana-admin-secret
        namespace: "{{ monitoring_namespace }}"
      register: grafana_secret

    - name: Fail if grafana-admin-secret does not exist
      fail:
        msg: |
          grafana-admin-secret not found in namespace {{ monitoring_namespace }}.
          Create it first:
          kubectl create secret generic grafana-admin-secret \
            --from-literal=admin-user=admin \
            --from-literal=admin-password='YOUR_SECURE_PASSWORD' \
            -n monitoring
      when: grafana_secret.resources | length == 0

    - name: Add Helm repositories
      kubernetes.core.helm_repository:
        name: "{{ item.value.repo_name }}"
        repo_url: "{{ item.value.repo_url }}"
      loop: "{{ helm_charts | dict2items }}"
      loop_control:
        label: "{{ item.value.repo_name }}"

    - name: Update Helm repos
      command: helm repo update
      changed_when: false

    - name: Deploy Helm charts
      kubernetes.core.helm:
        name: "{{ item.value.release }}"
        chart_ref: "{{ item.value.chart }}"
        chart_version: "{{ item.value.version }}"
        release_namespace: "{{ monitoring_namespace }}"
        create_namespace: false
        values_files:
          - "{{ item.value.values_file }}"
        wait: true
        timeout: 10m0s
      loop: "{{ helm_charts | dict2items }}"
      loop_control:
        label: "{{ item.value.release }}"

    - name: Apply Traefik IngressRoute for Grafana
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k8s-manifests/monitoring/grafana-ingressroute.yaml"

    - name: Wait for Grafana pod to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ monitoring_namespace }}"
        label_selectors:
          - "app.kubernetes.io/name=grafana"
        wait: true
        wait_condition:
          type: Ready
          status: "True"
        wait_timeout: 300

    - name: Monitoring stack deployment complete
      debug:
        msg: |
          Monitoring stack deployed.
          Grafana: https://monitoring.tunenumbers.de
          Login credentials: kubectl get secret grafana-admin-secret -n monitoring -o jsonpath='{.data.admin-password}' | base64 -d
