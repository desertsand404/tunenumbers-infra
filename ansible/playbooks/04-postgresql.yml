---
- name: Phase 4 — Deploy PostgreSQL
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vars/main.yml
    - ../vars/secrets.yml
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  tasks:
    - name: Template PostgreSQL secret
      ansible.builtin.template:
        src: ../../k8s-manifests/postgresql/secret.yml.j2
        dest: /tmp/postgresql-secret.yml
        mode: "0600"

    - name: Apply PostgreSQL secret
      ansible.builtin.command: kubectl apply -f /tmp/postgresql-secret.yml
      register: pg_secret
      changed_when: "'created' in pg_secret.stdout or 'configured' in pg_secret.stdout"

    - name: Remove templated secret file
      ansible.builtin.file:
        path: /tmp/postgresql-secret.yml
        state: absent

    - name: Apply PostgreSQL deployment
      ansible.builtin.command: kubectl apply -f ../../k8s-manifests/postgresql/deployment.yml
      register: pg_deploy
      changed_when: "'created' in pg_deploy.stdout or 'configured' in pg_deploy.stdout"

    - name: Apply PostgreSQL service
      ansible.builtin.command: kubectl apply -f ../../k8s-manifests/postgresql/service.yml
      register: pg_svc
      changed_when: "'created' in pg_svc.stdout or 'configured' in pg_svc.stdout"

    - name: Scale down PostgreSQL to clear stuck replicas
      ansible.builtin.command: >
        kubectl -n {{ namespaces.app }} scale deployment/postgresql --replicas=0
      changed_when: true

    - name: Wait for PostgreSQL pods to terminate
      ansible.builtin.shell: |
        kubectl -n {{ namespaces.app }} wait --for=delete pod -l app=postgresql --timeout=60s 2>/dev/null || true
      changed_when: false

    - name: Force-delete any remaining PostgreSQL pods
      ansible.builtin.shell: |
        kubectl -n {{ namespaces.app }} delete pods -l app=postgresql --force --grace-period=0 2>/dev/null || true
      changed_when: false

    - name: Clean corrupted pgdata directory for fresh init
      ansible.builtin.shell: |
        rm -rf {{ storage.postgresql.path }}/pgdata/*
      changed_when: true

    - name: Scale up PostgreSQL
      ansible.builtin.command: >
        kubectl -n {{ namespaces.app }} scale deployment/postgresql --replicas=1
      changed_when: true

    - name: Wait for PostgreSQL pod to be ready
      ansible.builtin.command: >
        kubectl -n {{ namespaces.app }} rollout status deployment/postgresql --timeout=120s
      changed_when: false
