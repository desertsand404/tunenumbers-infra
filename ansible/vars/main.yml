---
domain: tunenumbers.de
server_ip: 49.13.95.244
github_runner_user: github-runner
github_runner_dir: /opt/actions-runner
kubeconfig_path: /home/github-runner/.kube/config

namespaces:
  app: tunenumbers
  gitea: gitea

storage:
  postgresql:
    size: 5Gi
    path: /data/postgresql
  minio:
    size: 15Gi
    path: /data/minio
  gitea:
    size: 5Gi
    path: /data/gitea

resources:
  postgresql:
    requests: { memory: "256Mi", cpu: "100m" }
    limits: { memory: "512Mi", cpu: "250m" }
  minio:
    requests: { memory: "256Mi", cpu: "100m" }
    limits: { memory: "512Mi", cpu: "250m" }
  directus:
    requests: { memory: "256Mi", cpu: "200m" }
    limits: { memory: "512Mi", cpu: "500m" }
  gitea:
    requests: { memory: "256Mi", cpu: "200m" }
    limits: { memory: "512Mi", cpu: "500m" }
  gitea_runner:
    requests: { memory: "256Mi", cpu: "200m" }
    limits: { memory: "1536Mi", cpu: "1000m" }
  astro:
    requests: { memory: "128Mi", cpu: "100m" }
    limits: { memory: "256Mi", cpu: "200m" }
