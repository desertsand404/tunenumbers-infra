name: Deploy Manifests Only

on:
  push:
    branches: [main]
    paths:
      - 'k8s-manifests/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      KUBECONFIG: /home/github-runner/.kube/config
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          if ! command -v ansible-playbook &>/dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq ansible
          fi

      - name: Create secrets.yml from GitHub Secrets
        run: |
          cat > ansible/vars/secrets.yml <<EOF
          ---
          letsencrypt_email: "${{ secrets.LETSENCRYPT_EMAIL }}"
          pg_password: "${{ secrets.PG_PASSWORD }}"
          minio_root_user: "${{ secrets.MINIO_ROOT_USER }}"
          minio_root_password: "${{ secrets.MINIO_ROOT_PASSWORD }}"
          directus_admin_email: "${{ secrets.DIRECTUS_ADMIN_EMAIL }}"
          directus_admin_password: "${{ secrets.DIRECTUS_ADMIN_PASSWORD }}"
          directus_secret: "${{ secrets.DIRECTUS_SECRET }}"
          gitea_admin_user: "${{ secrets.GITEA_ADMIN_USER }}"
          gitea_admin_password: "${{ secrets.GITEA_ADMIN_PASSWORD }}"
          gitea_admin_email: "${{ secrets.GITEA_ADMIN_EMAIL }}"
          docker_config_json: "${{ secrets.DOCKER_CONFIG_JSON }}"
          EOF

      - name: Apply namespaces
        run: kubectl apply -f k8s-manifests/namespaces.yml

      - name: Apply storage manifests
        run: kubectl apply -f k8s-manifests/storage/

      - name: Template and apply secrets
        run: |
          ansible-playbook ansible/playbooks/04-postgresql.yml --tags secret 2>/dev/null || true
          ansible-playbook ansible/playbooks/05-minio.yml --tags secret 2>/dev/null || true
          ansible-playbook ansible/playbooks/06-directus.yml --tags secret 2>/dev/null || true

      - name: Apply PostgreSQL manifests
        run: |
          kubectl apply -f k8s-manifests/postgresql/deployment.yml
          kubectl apply -f k8s-manifests/postgresql/service.yml

      - name: Apply MinIO manifests
        run: |
          kubectl apply -f k8s-manifests/minio/deployment.yml
          kubectl apply -f k8s-manifests/minio/service.yml
          kubectl apply -f k8s-manifests/minio/ingress.yml

      - name: Apply Directus manifests
        run: |
          kubectl apply -f k8s-manifests/directus/deployment.yml
          kubectl apply -f k8s-manifests/directus/service.yml
          kubectl apply -f k8s-manifests/directus/ingress.yml

      - name: Apply Gitea manifests
        run: |
          kubectl apply -f k8s-manifests/gitea/deployment.yml
          kubectl apply -f k8s-manifests/gitea/service.yml
          kubectl apply -f k8s-manifests/gitea/ingress.yml
          kubectl apply -f k8s-manifests/gitea/runner-rbac.yml
          kubectl apply -f k8s-manifests/gitea/runner-deployment.yml

      - name: Apply Astro manifests
        run: |
          kubectl apply -f k8s-manifests/astro/deployment.yml
          kubectl apply -f k8s-manifests/astro/service.yml
          kubectl apply -f k8s-manifests/astro/ingress.yml

      - name: Restart changed deployments
        run: |
          kubectl -n tunenumbers rollout restart deployment/postgresql
          kubectl -n tunenumbers rollout restart deployment/minio
          kubectl -n tunenumbers rollout restart deployment/directus
          kubectl -n tunenumbers rollout restart deployment/astro-frontend
          kubectl -n gitea rollout restart deployment/gitea
          kubectl -n gitea rollout restart deployment/gitea-runner

      - name: Cleanup secrets
        if: always()
        run: rm -f ansible/vars/secrets.yml
